<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Terminal v1.0</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="terminal-container" id="terminalContainer">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="btn btn-close"></span>
                <span class="btn btn-minimize" id="minimizeBtn"></span>
                <span class="btn btn-maximize"></span>
            </div>
            <div class="terminal-title">auth-terminal@v1.0 ~ guest</div>
        </div>

        <div class="terminal-body" id="terminal">
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">guest@terminal:~$</span>
                <input type="text" id="command-input" class="command-input" autocomplete="off" autofocus />
                <span class="cursor" id="cursor">|</span>
            </div>
        </div>
    </div>

    <div class="minimized-card hidden" id="minimizedCard">
        <h3>Auth Terminal</h3>
        <p>📧 contato@exemplo.com</p>
        <p>📞 +55 (11) 99999-9999</p>
        <p>🌐 www.exemplo.com</p>
        <button id="restoreBtn">Reabrir Terminal</button>
    </div>

    <script type="module" src="dist/main.js"></script>

    <!-- Script do minimize fica separado -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const terminalContainer = document.getElementById("terminalContainer");
            const minimizeBtn = document.getElementById("minimizeBtn");
            const minimizedCard = document.getElementById("minimizedCard");
            const restoreBtn = document.getElementById("restoreBtn");

            minimizeBtn.addEventListener("click", () => {
                terminalContainer.classList.add("minimized");
                setTimeout(() => {
                    minimizedCard.classList.remove("hidden");
                }, 300);
            });

            restoreBtn.addEventListener("click", () => {
                minimizedCard.classList.add("hidden");
                setTimeout(() => {
                    terminalContainer.classList.remove("minimized");
                }, 100);
            });
        });
    </script>
</body>

</html>
